<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Slider</title>
  <link rel="stylesheet" type="text/css" href="slick-1.8.1/slick/slick.css"/>
  <link rel="stylesheet" type="text/css" href="slick-1.8.1/slick/slick-theme.css"/>
  <style>
    /* Custom styles */
   .main-slider img {
  width: 100%; /* Ensure the image stretches to the container width */
  height: auto; /* Maintain aspect ratio */
  border: 2px solid #fff; /* Optional border */
}

.thumbnail-slider {
  text-align: center; /* Center thumbnails below the main slider */
}

.thumbnail-slider .slick-slide {
  display: inline-block;
  margin: 0 10px; /* Spacing between thumbnails */
  opacity: 0.5; /* Dim inactive thumbnails */
}

.thumbnail-slider .slick-slide.slick-current img {
  transform: scale(1.1); /* Enlarge active thumbnail */
  opacity: 1; /* Highlight active thumbnail */
}
  </style>
</head>
<body>

<!-- Main Slider -->
<div class="main-slider">
  <div><img src="img/YellowTile128px.png" alt="Main Image 1"></div>
  <!-- ... more main images ... -->
</div>

<!-- Navigation Slider -->
<div class="thumbnail-slider">
  <div><img src="img/ss1.png" alt="Thumbnail 1"></div>
  <!-- ... more thumbnails ... -->
</div>

<script type="text/javascript" src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script type="text/javascript" src="slick-1.8.1/slick/slick.min.js"></script>
<script type="text/javascript">
  $(document).ready(function() {
  $('.main-slider').slick({
    slidesToShow: 1,
    slidesToScroll: 1,
    arrows: true,
    fade: true,
    asNavFor: '.thumbnail-slider'
  });

  $('.thumbnail-slider').slick({
    slidesToShow: 5, // Adjust based on how many thumbnails you want to show
    slidesToScroll: 1,
    asNavFor: '.main-slider',
    dots: false,
    centerMode: true,
    focusOnSelect: true
  });
});
</script>

</body>
</html>
